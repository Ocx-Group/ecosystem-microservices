version: '3.9'

# =============================================================================
# docker-compose.dev.yml — Local development stack
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#
# Services exposed:
#   RabbitMQ AMQP   → localhost:5672
#   RabbitMQ UI     → http://localhost:15672  (guest / guest)
#   PostgreSQL      → localhost:5432          (postgres / postgres)
#   Redis           → localhost:6379
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # RabbitMQ — Message broker (MassTransit)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecosystem-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PostgreSQL — One instance, one DB per microservice
  # Init script creates all service databases on first run.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: ecosystem-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Tools/docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — Cache (ConfigurationService + shared)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ecosystem-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
  postgres_data:
  redis_data:


