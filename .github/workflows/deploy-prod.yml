# =============================================================================
# Deploy Production
# Trigger: push a 'main' o tag vX.Y.Z (o manual via workflow_dispatch)
#
# Flujo GitOps con ArgoCD Image Updater (sin commits a git desde CI):
#   1. Build & push de las 7 imagenes Docker con tag :sha-XXXXXXXX (o :vX.Y.Z) + :latest
#   2. terraform apply -var-file=environments/prod.tfvars  (idempotente; no-op si no hay drift)
#   3. ArgoCD Image Updater detecta el nuevo tag en DOCR (~2 min) y patchea
#      las Applications via API (write-back-method=argocd) — NO commits a git.
#   4. ArgoCD sincroniza automaticamente los deployments.
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false # nunca cancelar un deploy de prod en curso

env:
  REGISTRY: registry.digitalocean.com/ocx-registry
  TF_DIR: Infrastructure/terraform
  K8S_NAMESPACE: ecosystem
  CLUSTER_NAME: ecosystem-prod-k8s

jobs:
  # ===========================================================================
  # JOB 1 — Build & push de todas las imagenes Docker
  # ===========================================================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="sha-$(echo $GITHUB_SHA | cut -c1-8)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building production with tag: $VERSION"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 3600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push gateway-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/GatewayService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/gateway-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/gateway-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/gateway-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/gateway-service:buildcache,mode=max

      - name: Build & Push account-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/AccountService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/account-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/account-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/account-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/account-service:buildcache,mode=max

      - name: Build & Push wallet-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/WalletService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/wallet-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/wallet-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/wallet-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/wallet-service:buildcache,mode=max

      - name: Build & Push inventory-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/InventoryService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/inventory-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/inventory-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inventory-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/inventory-service:buildcache,mode=max

      - name: Build & Push configuration-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/ConfigurationService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/configuration-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/configuration-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/configuration-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/configuration-service:buildcache,mode=max

      - name: Build & Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/NotificationService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/notification-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/notification-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/notification-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/notification-service:buildcache,mode=max

      - name: Build & Push migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Tools/Ecosystem.Migrator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/migrator:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/migrator:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/migrator:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/migrator:buildcache,mode=max

  # ===========================================================================
  # JOB 2 — Terraform apply (idempotente)
  # En la primera ejecucion crea/importa todo. En las siguientes es no-op
  # salvo que haya cambios a la infra (instalar image-updater, escalar nodos…)
  # Recursos criticos (DB, registry, spaces) tienen prevent_destroy.
  # ===========================================================================
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}

    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl (so kubernetes/helm providers can authenticate)
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Terraform Init
        run: terraform init -reconfigure -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/prod.tfvars" \
            -input=false -lock=true -no-color \
            -out=tfplan-prod 2>&1 | tee plan-output.txt

          # Guard: bloquear si el plan destruye/reemplaza recursos protegidos
          PROTECTED='digitalocean_kubernetes_cluster|digitalocean_database_cluster|digitalocean_spaces_bucket\.main|digitalocean_container_registry'
          if grep -E "# .* will be (destroyed|replaced)" plan-output.txt | grep -E "$PROTECTED"; then
            echo "::error::Cambio destructivo detectado en recurso protegido. Revisar manualmente."
            exit 1
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan-prod

  # ===========================================================================
  # JOB 3 — Esperar a ArgoCD Image Updater y verificar rollout
  # No hace kubectl set image ni git push: solo observa.
  # ===========================================================================
  verify-deployment:
    name: Verify Deployment via ArgoCD Image Updater
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-deploy]
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Wait for Image Updater to detect new tag
        run: |
          echo "Esperando a que ArgoCD Image Updater detecte el tag ${VERSION} en DOCR..."
          echo "(polling cada 15s, hasta 5 min)"

          DEPLOY="account-service"  # canario: si este se actualiza, los demas siguen
          for i in $(seq 1 20); do
            IMAGE=$(kubectl get deployment $DEPLOY -n ${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "none")
            echo "  [$i/20] $DEPLOY image = $IMAGE"
            if echo "$IMAGE" | grep -q ":${VERSION}$"; then
              echo "Image Updater detecto el tag. Continuando."
              break
            fi
            if [ "$i" = "20" ]; then
              echo "::warning::Timeout esperando Image Updater. Revisar:"
              echo "  kubectl logs -n argocd -l app.kubernetes.io/name=argocd-image-updater --tail=50"
              exit 0
            fi
            sleep 15
          done

      - name: Verify rollouts
        run: |
          SERVICES=(gateway-service account-service wallet-service inventory-service configuration-service notification-service)
          FAILED=()
          for S in "${SERVICES[@]}"; do
            echo "==> $S"
            if ! kubectl rollout status deployment/$S -n ${{ env.K8S_NAMESPACE }} --timeout=180s; then
              FAILED+=("$S")
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Rollouts fallidos: ${FAILED[*]}"
            exit 1
          fi
          echo "Todos los servicios desplegaron con tag ${VERSION}."

  # ===========================================================================
  # JOB 4 — Crear GitHub Release
  # ===========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, verify-deployment]
    if: success()
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-and-push.outputs.version }}
          name: "Release ${{ needs.build-and-push.outputs.version }}"
          body: |
            ## Deploy Production — ${{ needs.build-and-push.outputs.version }}

            **Commit:** ${{ github.sha }}
            **Deployed by:** ${{ github.actor }}
            **Trigger:** ${{ github.event_name }}

            ### Images pushed to DOCR
            - `gateway-service:${{ needs.build-and-push.outputs.version }}`
            - `account-service:${{ needs.build-and-push.outputs.version }}`
            - `wallet-service:${{ needs.build-and-push.outputs.version }}`
            - `inventory-service:${{ needs.build-and-push.outputs.version }}`
            - `configuration-service:${{ needs.build-and-push.outputs.version }}`
            - `notification-service:${{ needs.build-and-push.outputs.version }}`
            - `migrator:${{ needs.build-and-push.outputs.version }}`

            Deployments updated automatically by ArgoCD Image Updater.
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
