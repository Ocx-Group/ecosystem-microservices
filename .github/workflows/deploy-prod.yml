name: Deploy to Production

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  REGISTRY: registry.digitalocean.com/ocx-registry
  TF_DIR: Infrastructure/terraform
  K8S_NAMESPACE: ecosystem
  CLUSTER_NAME: ecosystem-prod-k8s

jobs:
  # ===========================================================================
  # JOB 1 — Build & Push all Docker images
  # ===========================================================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="sha-$(echo $GITHUB_SHA | cut -c1-8)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Log in to DO Container Registry
        run: doctl registry login --expiry-seconds 3600

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push gateway-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/GatewayService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/gateway-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/gateway-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/gateway-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/gateway-service:buildcache,mode=max

      - name: Build & Push account-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/AccountService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/account-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/account-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/account-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/account-service:buildcache,mode=max

      - name: Build & Push wallet-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/WalletService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/wallet-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/wallet-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/wallet-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/wallet-service:buildcache,mode=max

      - name: Build & Push inventory-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/InventoryService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/inventory-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/inventory-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/inventory-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/inventory-service:buildcache,mode=max

      - name: Build & Push configuration-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/ConfigurationService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/configuration-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/configuration-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/configuration-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/configuration-service:buildcache,mode=max

      - name: Build & Push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Microservices/NotificationService/Api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/notification-service:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/notification-service:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/notification-service:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/notification-service:buildcache,mode=max

      - name: Build & Push migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Tools/Ecosystem.Migrator/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/migrator:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/migrator:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/migrator:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/migrator:buildcache,mode=max

  # ===========================================================================
  # JOB 2 — Terraform: provision / update infrastructure
  # ===========================================================================
  terraform-deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      lb_ip: ${{ steps.lb-ip.outputs.lb_ip }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      # Remote backend uses Spaces credentials via AWS_ env vars
      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: terraform init -reconfigure

      # Import existing DO resources — safe to re-run (|| true ignores "already managed")
      - name: Import existing resources
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_spaces_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          terraform import module.database.digitalocean_database_cluster.main \
            93ee7485-7c11-47dc-9a3b-a5187723d7ff 2>&1 || true
          terraform import module.database.digitalocean_database_db.main \
            "93ee7485-7c11-47dc-9a3b-a5187723d7ff,ocx_group" 2>&1 || true
          terraform import module.registry.digitalocean_container_registry.main \
            ocx-registry 2>&1 || true
          terraform import module.spaces.digitalocean_spaces_bucket.main \
            ecosystem-storage 2>&1 || true

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      # Phase 1: Create K8s cluster and base infra (no Helm/namespace providers yet)
      - name: Terraform Apply — Phase 1 (K8s cluster + base infra)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_spaces_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          terraform plan \
            -var-file="environments/prod.tfvars" \
            -target=module.database \
            -target=module.spaces \
            -target=module.registry \
            -target=module.kubernetes \
            -no-color -out=tfplan-phase1
          
          # Guard: no destructive changes to protected resources
          PLAN=$(terraform show -no-color tfplan-phase1)
          PROTECTED="digitalocean_kubernetes_cluster\|digitalocean_database_cluster\|digitalocean_spaces_bucket.main"
          if echo "$PLAN" | grep -E "# .* will be (destroyed|replaced)" | grep -E "$PROTECTED"; then
            echo "::error::Destructive change to a protected resource detected. Review manually."
            exit 1
          fi
          
          terraform apply -auto-approve tfplan-phase1

      # Configure kubectl so Phase 2 (Helm) and later jobs can use the cluster
      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      # Phase 2: Install Helm charts (ArgoCD, Sealed Secrets, NGINX, cert-manager) + namespaces
      - name: Terraform Apply — Phase 2 (Helm charts + namespaces)
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_spaces_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          terraform plan \
            -var-file="environments/prod.tfvars" \
            -no-color -out=tfplan-phase2
          terraform apply -auto-approve tfplan-phase2

      # Create the DB credentials secret so migrations and services can use it
      - name: Create DB credentials secret in K8s
        working-directory: ${{ env.TF_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          DB_CONN=$(terraform output -raw db_connection_string)
          echo "::add-mask::$DB_CONN"
          kubectl create secret generic db-credentials \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=connection-string="$DB_CONN" \
            --dry-run=client -o yaml | kubectl apply -f -

      # Wait for NGINX to provision its DO Load Balancer
      - name: Wait for Load Balancer IP
        id: lb-ip
        run: |
          echo "Waiting for DO Load Balancer IP (up to 10 min)..."
          for i in $(seq 1 20); do
            LB_IP=$(kubectl get svc ingress-nginx-controller \
              -n ingress-nginx \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$LB_IP" ]; then
              echo "✅ LB IP: $LB_IP"
              echo "lb_ip=$LB_IP" >> $GITHUB_OUTPUT
              break
            fi
            echo "Attempt $i/20 — not ready, retrying in 30s..."
            sleep 30
          done

      # Phase 3 (conditional): Apply Cloudflare + DO DNS now that LB IP is known
      - name: Terraform Apply — Phase 3 (Cloudflare + DNS)
        if: steps.lb-ip.outputs.lb_ip != ''
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_spaces_access_id: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          TF_VAR_spaces_secret_key: ${{ secrets.DO_SPACES_SECRET_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          TF_VAR_k8s_lb_ip: ${{ steps.lb-ip.outputs.lb_ip }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET_KEY }}
        run: |
          terraform apply \
            -var-file="environments/prod.tfvars" \
            -var="k8s_lb_ip=${{ steps.lb-ip.outputs.lb_ip }}" \
            -auto-approve

  # ===========================================================================
  # JOB 3 — Run EF Core database migrations  [DESHABILITADO]
  # Las migrations se manejan manualmente fuera del CI/CD para evitar
  # afectar la BD existente con data en producción. Para reactivar,
  # quitar el `if: false` y asegurarse de que la imagen `migrator` exista
  # y sea compatible con el schema actual.
  # ===========================================================================
  run-migrations:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    if: false
    needs: [build-and-push, terraform-deploy]
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      - name: Ensure registry secret in namespace
        run: |
          doctl kubernetes cluster registry add-namespace ${{ env.K8S_NAMESPACE }} || true

      - name: Run migration Job
        run: |
          JOB_NAME="db-migration-$(echo $VERSION | tr '.' '-' | tr '+' '-')"
          kubectl apply -f - <<EOF
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: $JOB_NAME
            namespace: ${{ env.K8S_NAMESPACE }}
            labels:
              app: migrator
              version: "$VERSION"
          spec:
            backoffLimit: 2
            ttlSecondsAfterFinished: 600
            template:
              spec:
                restartPolicy: Never
                imagePullSecrets:
                  - name: ocx-registry
                containers:
                  - name: migrator
                    image: ${{ env.REGISTRY }}/migrator:$VERSION
                    env:
                      - name: ConnectionStrings__DefaultConnection
                        valueFrom:
                          secretKeyRef:
                            name: db-credentials
                            key: connection-string
          EOF
          
          echo "Waiting for migration job '$JOB_NAME' to complete (up to 5 min)..."
          kubectl wait --for=condition=complete job/$JOB_NAME \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

  # ===========================================================================
  # JOB 4 — Update K8s manifests with new image tags (GitOps commit)
  # ===========================================================================
  update-k8s-images:
    name: Update K8s Image Tags
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform-deploy]
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use default GITHUB_TOKEN — pushes from this token do NOT re-trigger workflows
          token: ${{ github.token }}

      - name: Install yq
        uses: mikefarah/yq@v4.43.1

      - name: Update deployment image tags
        run: |
          SERVICES=(
            "gateway-service"
            "account-service"
            "wallet-service"
            "inventory-service"
            "configuration-service"
            "notification-service"
          )
          for SERVICE in "${SERVICES[@]}"; do
            FILE="Infrastructure/k8s/services/${SERVICE}/deployment.yaml"
            if [ -f "$FILE" ]; then
              yq e \
                ".spec.template.spec.containers[0].image = \"${{ env.REGISTRY }}/${SERVICE}:${VERSION}\"" \
                -i "$FILE"
              echo "✅ $SERVICE → $VERSION"
            fi
          done

      - name: Commit and push manifest updates
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Infrastructure/k8s/services/
          if git diff --staged --quiet; then
            echo "No image tag changes to commit."
          else
            git commit -m "chore(k8s): update service images to ${VERSION} [skip ci]"
            git push
          fi

  # ===========================================================================
  # JOB 5 — Verify all deployments are healthy (ArgoCD syncs the new tags)
  # ===========================================================================
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [build-and-push, update-k8s-images]
    env:
      VERSION: ${{ needs.build-and-push.outputs.version }}

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save ${{ env.CLUSTER_NAME }}

      # Give ArgoCD time to detect the manifest changes and start rolling out
      - name: Wait for ArgoCD to sync
        run: |
          echo "Waiting for ArgoCD to sync (2 min)..."
          sleep 120

      - name: Verify all service rollouts
        run: |
          SERVICES=(
            "gateway-service"
            "account-service"
            "wallet-service"
            "inventory-service"
            "configuration-service"
            "notification-service"
          )
          FAILED=()
          for SERVICE in "${SERVICES[@]}"; do
            echo "Checking $SERVICE..."
            if ! kubectl rollout status deployment/$SERVICE \
              -n ${{ env.K8S_NAMESPACE }} --timeout=180s; then
              FAILED+=("$SERVICE")
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "::error::Deployments failed: ${FAILED[*]}"
            exit 1
          fi
          echo "✅ All deployments healthy."

      - name: Print deployment summary
        run: |
          echo "## Deployment Summary — $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n ${{ env.K8S_NAMESPACE }} \
            -o custom-columns="NAME:.metadata.name,READY:.status.readyReplicas,DESIRED:.status.replicas,IMAGE:.spec.template.spec.containers[0].image" \
            >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # JOB 6 — Create GitHub Release (only on semver tag pushes)
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify-deployment
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          generateReleaseNotes: true
          makeLatest: true
          body: |
            ## 🚀 Deployed to Production

            **Version:** `${{ github.ref_name }}`
            **Registry:** `${{ env.REGISTRY }}`

            ### Services Updated

            | Service | Image |
            |---------|-------|
            | gateway-service | `${{ env.REGISTRY }}/gateway-service:${{ github.ref_name }}` |
            | account-service | `${{ env.REGISTRY }}/account-service:${{ github.ref_name }}` |
            | wallet-service | `${{ env.REGISTRY }}/wallet-service:${{ github.ref_name }}` |
            | inventory-service | `${{ env.REGISTRY }}/inventory-service:${{ github.ref_name }}` |
            | configuration-service | `${{ env.REGISTRY }}/configuration-service:${{ github.ref_name }}` |
            | notification-service | `${{ env.REGISTRY }}/notification-service:${{ github.ref_name }}` |

            ### Verify
            ```bash
            kubectl get deployments -n ecosystem
            ```
