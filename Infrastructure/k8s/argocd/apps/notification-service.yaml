apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # ArgoCD Image Updater — detecta nuevas imagenes en DOCR y actualiza el deployment
    # write-back-method=argocd => modifica la Application via API, NO commits a git
    argocd-image-updater.argoproj.io/image-list: app=registry.digitalocean.com/ocx-registry/notification-service
    argocd-image-updater.argoproj.io/app.update-strategy: newest-build
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^(sha-[a-f0-9]{8}|v\d+\.\d+\.\d+)$
    argocd-image-updater.argoproj.io/app.pull-secret: pullsecret:ecosystem/ocx-registry
    argocd-image-updater.argoproj.io/app.kustomize.image-name: registry.digitalocean.com/ocx-registry/notification-service
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: ecosystem
  source:
    repoURL: https://github.com/Ocx-Group/ecosystem-microservices
    targetRevision: main
    path: Infrastructure/k8s/services/notification-service
  destination:
    server: https://kubernetes.default.svc
    namespace: ecosystem
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false