# RBAC para que ArgoCD Image Updater pueda leer el imagePullSecret 'ocx-registry'
# desde el namespace 'ecosystem' (necesario para autenticarse contra DOCR).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-pullsecrets
  namespace: ecosystem
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ocx-registry"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-pullsecrets
  namespace: ecosystem
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater-pullsecrets
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater
    namespace: argocd
