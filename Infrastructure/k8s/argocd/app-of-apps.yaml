apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecosystem-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ecosystem

  source:
    repoURL: https://github.com/Ocx-Group/ecosystem-microservices
    targetRevision: main
    path: Infrastructure/k8s/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
