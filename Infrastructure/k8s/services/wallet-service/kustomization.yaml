apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecosystem

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml

# images is patched by ArgoCD Image Updater (write-back-method=argocd)
images:
  - name: registry.digitalocean.com/ocx-registry/wallet-service
    newTag: latest