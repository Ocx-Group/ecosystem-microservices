apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: ecosystem
  labels:
    app: account-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
        version: "1.0.0"
    spec:
      containers:
        - name: account-service
          image: registry.digitalocean.com/ocx-registry/account-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: ASPNETCORE_GRPC_PORT
              value: "50051"
            - name: ConnectionStrings__PostgreSqlConnection
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: connection-string
            - name: RabbitMQ__Host
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: host
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
            - name: ObjectStorage__AccessKey
              valueFrom:
                secretKeyRef:
                  name: spaces-credentials
                  key: access-key
            - name: ObjectStorage__SecretKey
              valueFrom:
                secretKeyRef:
                  name: spaces-credentials
                  key: secret-key
            - name: ObjectStorage__BucketName
              value: "ecosystem-storage"
            - name: ObjectStorage__Region
              value: "nyc3"
            - name: ObjectStorage__PublicBaseUrl
              value: "https://ecosystem-storage.nyc3.digitaloceanspaces.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "750m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      imagePullSecrets:
        - name: ocx-registry
