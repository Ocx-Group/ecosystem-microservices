apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: ecosystem
data:
  # Orígenes permitidos separados por coma (leído por el Gateway en startup)
  CORS_ALLOWED_ORIGINS: "https://ecosystemfx.net,https://recybotia.com,https://recycoin.net"
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_HTTP_PORTS: "8080"
  Services__AccountService: "http://account-service:8080"
  Services__WalletService: "http://wallet-service:8080"
  Services__InventoryService: "http://inventory-service:8080"
  Services__ConfigurationService: "http://configuration-service:8080"
  Services__NotificationService: "http://notification-service:8080"
