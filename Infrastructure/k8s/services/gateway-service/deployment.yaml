apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: ecosystem
  labels:
    app: gateway-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        version: "1.0.0"
    spec:
      containers:
        - name: gateway-service
          image: registry.digitalocean.com/ocx-registry/gateway-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: ASPNETCORE_ENVIRONMENT
            - name: ASPNETCORE_HTTP_PORTS
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: ASPNETCORE_HTTP_PORTS
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: CORS_ALLOWED_ORIGINS
            - name: Services__AccountService
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: Services__AccountService
            - name: Services__WalletService
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: Services__WalletService
            - name: Services__InventoryService
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: Services__InventoryService
            - name: Services__ConfigurationService
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: Services__ConfigurationService
            - name: Services__NotificationService
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: Services__NotificationService
            - name: RabbitMQ__Host
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: host
            - name: RabbitMQ__Username
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          resources:
            requests:
              memory: "192Mi"
              cpu: "100m"
            limits:
              memory: "384Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      imagePullSecrets:
        - name: ocx-registry
